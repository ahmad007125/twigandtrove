<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Styling — Twig & Trove Interiors Dallas</title>
  <meta name="description" content="Editorial styling projects by Kimberly Knight of Twig & Trove Interiors, published in Traditional Home Magazine, Luxe Magazine, and Meredith Publications." />
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }
      .page-shell { height: auto; min-height: 100vh; }
      .drag-bar { display: none; }
    }
    .page-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: var(--nav-height);
    }
    .projects-track {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow-x: scroll;
      overflow-y: hidden;
      cursor: grab;
      scrollbar-width: none;
      gap: 3px;
    }
    .projects-track::-webkit-scrollbar { display: none; }
    .projects-track:active { cursor: grabbing; }
    .project-panel {
      flex: 0 0 38vw;
      position: relative;
      overflow: hidden;
    }
    .project-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      pointer-events: none;
      display: block;
    }
    .project-panel:hover img { transform: scale(1.03); }
    .project-panel-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 60px 28px 28px;
      background: linear-gradient(to top, rgba(30,22,16,0.65) 0%, transparent 100%);
    }
    .project-panel-title {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: white;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .project-panel-sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }
    .drag-bar {
      flex-shrink: 0;
      padding: 13px 48px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 0.5px solid var(--rule);
      border-bottom: 0.5px solid var(--rule);
    }
    .drag-bar::before {
      content: '';
      display: block;
      width: 28px;
      height: 0.5px;
      background: var(--muted);
    }

    @media (max-width: 768px) {
      .nav-hamburger { display: flex !important; }
      .nav-links { display: none !important; }
    }
  </style>
  <link rel="canonical" href="https://www.twigandtrove.com/styling.html" />
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <img class="nav-logo-bird" src="images/ui/logo-bird.svg" alt="Twig and Trove Interiors" />
    <div class="nav-logo-text">
      <div class="nav-logo-wordmark">Twig &amp; Trove Interiors</div>
      <div class="nav-logo-sub">Kimberly Knight &nbsp;·&nbsp; Dallas</div>
    </div>
  </a>
  <ul class="nav-links">
    <li onclick="location.href='about.html'">About</li>
    <li class="pipe">|</li>
    <li onclick="location.href='portfolio.html'">Portfolio</li>
    <li class="pipe">|</li>
    <li class="active">Styling</li>
    <li class="pipe">|</li>
    <li onclick="location.href='press.html'">Press</li>

    <li class="pipe">|</li>
    <li onclick="location.href='work.html'">Work With Us</li>
  </ul>
  <button class="nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="nav-rule"></div>
<div class="nav-mobile-menu" id="nav-mobile-menu">
  <a href="about.html">About</a>
  <a href="portfolio.html">Portfolio</a>

<h1 class="page-seo-title" style="position:absolute;left:-9999px;">Editorial Styling — Twig &amp; Trove Interiors Dallas</h1>

<div class="page-shell">
  <div class="projects-track" id="projects-track"></div>
  <div class="drag-bar">Drag to explore &rarr;</div>
  <div id="footer-wrap"></div>
</div>

<script src="projects.js"></script>
<script src="nav.js"></script>
<script>
  const track = document.getElementById('projects-track');

  PROJECTS.styling.forEach(p => {
    const panel = document.createElement('div');
    panel.className = 'project-panel';
    panel.innerHTML = `
      <img src="images/${p.key}/${p.key}-01.webp"
           alt="${p.title} editorial styling by Kimberly Knight of Twig and Trove Interiors" />
      <div class="project-panel-info">
        <div class="project-panel-title">${p.title}</div>
        <div class="project-panel-sub">View Project</div>
      </div>
    `;
    panel.addEventListener('click', () => { location.href = `landing.html?project=${p.key}`; });
    track.appendChild(panel);
  });

  document.getElementById('footer-wrap').innerHTML = footerHTML();

  let isDown = false, startX, scrollLeft, didDrag = false;
  track.addEventListener('mousedown', e => {
    isDown = true; didDrag = false;
    track.style.cursor = 'grabbing';
    startX = e.pageX - track.offsetLeft;
    scrollLeft = track.scrollLeft;
  });
  document.addEventListener('mouseup', () => { isDown = false; track.style.cursor = 'grab'; });
  track.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault(); didDrag = true;
    track.scrollLeft = scrollLeft - (e.pageX - track.offsetLeft - startX) * 1.5;
  });
  track.addEventListener('click', e => { if (didDrag) e.stopImmediatePropagation(); }, true);

  let tX, tSL;
  track.addEventListener('touchstart', e => { tX = e.touches[0].pageX; tSL = track.scrollLeft; }, { passive: true });
  track.addEventListener('touchmove', e => { track.scrollLeft = tSL - (e.touches[0].pageX - tX) * 1.5; }, { passive: true });

  function toggleMobileMenu() {
    const menu = document.getElementById('nav-mobile-menu');
    if (menu) menu.classList.toggle('open');
  }
</script>
</body>
</html>
