<script>

  // Image Preload for better performance
  const key = new URLSearchParams(location.search).get('post');
  if (key) {
    const link = document.createElement('link');
    link.rel = 'preload';
    link.as = 'image';
    link.href = `images/blog/${key}-01.webp`;
    link.setAttribute('imagesrcset', `images/blog/${key}-01.webp 480w, images/blog/${key}-01.webp 640w`);
    link.setAttribute('imagesizes', '(max-width:600px) 412px, 558px');
    link.fetchPriority = 'high';
    document.head.appendChild(link);
  }

  window.addEventListener('load', function () {
    const params = new URLSearchParams(location.search);
    const key = params.get('post');
    const post = BLOG_POSTS.find(p => p.key === key);

    if (!post) {
      location.href = 'inspiration.html';
    } else {
      document.getElementById('page-title').textContent = `${post.title} — Twig & Trove Interiors`;
      document.getElementById('page-desc').setAttribute('content', post.body.substring(0, 160));

      const content = document.getElementById('post-content');
      const paragraphs = post.body.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('\n');

      // Build image array — use customImages if defined, otherwise auto-generate
      const images = post.customImages ? post.customImages : [];
      if (!post.customImages) {
        for (let i = 1; i <= post.imageCount; i++) {
          images.push({ src: `images/blog/${post.key}-${String(i).padStart(2,'0')}.webp`, caption: '' });
        }
      }

      // Normalise to object format
      // const normImages = images.map(img =>
      //   typeof img === 'string' ? { src: img, caption: '' } : img
      // );
      // // Helper to render an image with optional caption
      // function imgHTML(imgObj, altText) {
      //   const cap = imgObj.caption
      //     ? `<figcaption style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:8px;margin-bottom:24px;">${imgObj.caption}</figcaption>`
      //     : '';
      //   return `<figure style="margin:32px 0 0;">`
      //     + `<img src="${imgObj.src}" alt="${altText}" fetchpriority="high" style="width:100%;display:block;" />`
      //     + cap
      //     + `</figure>`;
      // }

      const normImages = images.map(img =>
        typeof img === 'string'
          ? { src: img, caption: '' }
          : img
      );
      // Helper to render an image with optional caption
      let imageIndex = 0;
      function imgHTML(imgObj, altText) {
        const isFirstImage = imageIndex === 0;
        imageIndex++;
        const cap = imgObj.caption
          ? `<figcaption style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:8px;margin-bottom:24px;">${imgObj.caption}</figcaption>`
          : '';
        return `
          <figure style="margin:32px 0 0;">
            <img
              src="${imgObj.src}"
              alt="${altText}"
              width="${534}"
              height="${664}"
              style="width: 100%; height: 100%; display: block;"
              ${isFirstImage
                ? 'fetchpriority="high" loading="eager"'
                : 'loading="lazy"'}
              style="width:100%;display:block;"
            />
            ${cap}
          </figure>
        `;
      }

      const paras = post.body.split('\n\n').filter(p => p.trim());
      let html = `
        <div class="blog-post-category">${post.category}</div>
        <h1 class="blog-post-title">${post.title}</h1>
        <div class="blog-post-date">${post.date}</div>
        <div class="blog-post-body">
      `;

      // First image before text
      if (normImages[0]) {
        html += imgHTML(normImages[0], post.title + ' — Twig and Trove Interiors');
      }

      paras.forEach((para, i) => {
        html += `<p>${para}</p>`;
        const imgIdx = i + 1;
        if (normImages[imgIdx]) {
          html += imgHTML(normImages[imgIdx], post.title + ' — Twig and Trove Interiors');
        }
      });

      html += '</div>';
      content.innerHTML = html;
      document.getElementById('footer-wrap').innerHTML = footerHTML();
    }
  });

  function toggleMobileMenu() {
    const menu = document.getElementById('nav-mobile-menu');
    if (menu) menu.classList.toggle('open');
  }

  (function () {
    const params = new URLSearchParams(window.location.search);
    const project = params.get('project');
    const start = parseInt(params.get('start') || '1', 10);
    if (!project) return;
    // Always preload the first image
    const firstImage = `images/${project}/${project}-01.webp`;
    const firstPreload = document.createElement('link');
    firstPreload.rel = 'preload';
    firstPreload.as = 'image';
    firstPreload.href = firstImage;
    firstPreload.fetchPriority = 'high';
    document.head.appendChild(firstPreload);
    // Preload target + previous 3 images
    for (let i = start; i >= Math.max(1, start - 3); i--) {
      const image = `images/${project}/${project}-${String(i).padStart(2, '0')}.webp`;
      // Skip if it's the first image (already added)
      if (i === 1) continue;
      const preload = document.createElement('link');
      preload.rel = 'preload';
      preload.as = 'image';
      preload.href = image;
      if (i === start) {
        preload.fetchPriority = 'high';
      }
      document.head.appendChild(preload);
    }
  })();

</script>
</body>
</html>
