<div class="page-wrap">
  <div class="landing-wrap">
    <div class="landing-thumbs-col">
      <div class="landing-grid" id="thumb-grid"></div>
    </div>
    <div class="landing-info-col">
      <div>
        <div class="landing-rule"></div>
        <div class="landing-project-title" id="project-title"></div>
        <p class="landing-description" id="project-desc"></p>
        <div class="landing-credits" id="project-credits"></div>
      </div>
      <div>
        <a class="landing-back" id="back-link" href="#">&#8592; Back</a>
      </div>
    </div>
  </div>
  <div id="footer-wrap"></div>
</div>

<script src="projects.js"></script>
<script src="nav.js"></script>
<script>
  // Get project key from URL
  const params = new URLSearchParams(location.search);
  const key = params.get('project');

  // Find project in either portfolio or styling
  const allProjects = [...PROJECTS.portfolio, ...PROJECTS.styling];
  const project = allProjects.find(p => p.key === key);
  const isPortfolio = PROJECTS.portfolio.find(p => p.key === key);

  if (!project) {
    location.href = 'portfolio.html';
  } else {
    // Set page title and meta
    document.getElementById('page-title').textContent = `${project.title} — Twig & Trove Interiors Dallas`;
    document.getElementById('page-desc').setAttribute('content', project.description);

    // Set active nav
    if (isPortfolio) {
      document.getElementById('nav-portfolio').classList.add('active');
    } else {
      document.getElementById('nav-styling').classList.add('active');
    }

    // Back link
    document.getElementById('back-link').href = isPortfolio ? 'portfolio.html' : 'styling.html';

    // Project info
    document.getElementById('project-title').textContent = project.title;
    document.getElementById('project-desc').textContent = project.description;

    const creditsEl = document.getElementById('project-credits');
    project.credits.forEach(c => {
      const line = document.createElement('div');
      line.innerHTML = `<strong style="text-transform:uppercase;letter-spacing:0.14em;">${c.label}:</strong> ${c.value}`;
      creditsEl.appendChild(line);
    });

    // Thumbnails
    const grid = document.getElementById('thumb-grid');
    for (let i = 1; i <= project.imageCount; i++) {
      const div = document.createElement('div');
      div.className = 'landing-thumb';
      div.onclick = () => location.href = `gallery.html?project=${key}&start=${i}`;
      const img = document.createElement('img');
      img.src = projectImagePath(key, i);
      const alt = (project.altTags && project.altTags[i-1])
        ? project.altTags[i-1]
        : `${project.title} — image ${i} by Kimberly Knight of Twig and Trove Interiors Dallas`;
      img.alt = alt;
      img.loading = 'lazy';
      div.appendChild(img);
      grid.appendChild(div);
    }
    document.getElementById('footer-wrap').innerHTML = footerHTML();
  }

  function toggleMobileMenu() {
    const menu = document.getElementById('nav-mobile-menu');
    if (menu) menu.classList.toggle('open');
  }
</script>
</body>
</html>
