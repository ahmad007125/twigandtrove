<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Press — Twig & Trove Interiors Dallas</title>
  <meta name="description" content="Twig & Trove Interiors has been featured in Luxe Interiors + Design, Traditional Home Magazine, Business of Home, Luxe Magazine, Milwaukee Magazine, and more." />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D44MFG1JCW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-D44MFG1JCW');
  </script>

  <link rel="stylesheet" href="style.css" />
  <style>
    .press-wrap {
      padding: 64px 80px 80px;
    }
    .press-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 80px;
    }
    .press-item {
      padding: 22px 0;
      border-bottom: 0.5px solid var(--rule);
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: opacity 0.2s;
    }
    .press-item:hover { opacity: 0.6; }
    .press-item.no-link { cursor: default; pointer-events: none; }
    .press-pub {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .press-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--charcoal);
      line-height: 1.3;
    }
    .press-item.no-link .press-title { color: var(--muted); }
    /* Top border only on first two items (top of each column) */
    .press-item:first-child,
    .press-item:nth-child(2) { border-top: 0.5px solid var(--rule); }
  </style>
  <link rel="canonical" href="https://www.twigandtrove.com/press.html" />
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <img class="nav-logo-bird" src="images/ui/logo-bird.svg" alt="Twig and Trove Interiors" />
    <div class="nav-logo-text">
      <div class="nav-logo-wordmark">Twig &amp; Trove Interiors</div>
      <div class="nav-logo-sub">Kimberly Knight &nbsp;·&nbsp; Dallas</div>
    </div>
  </a>
  <ul class="nav-links">
    <li onclick="location.href='about.html'">About</li>
    <li class="pipe">|</li>
    <li onclick="location.href='portfolio.html'">Portfolio</li>
    <li class="pipe">|</li>
    <li onclick="location.href='styling.html'">Styling</li>
    <li class="pipe">|</li>
    <li class="active">Buzz</li>
    <li class="pipe">|</li>
    <li onclick="location.href='inspiration.html'">Inspiration</li>
    <li class="pipe">|</li>
    <li onclick="location.href='work.html'">Work With Us</li>
  </ul>
  <button class="nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="nav-rule"></div>
<div class="nav-mobile-menu" id="nav-mobile-menu">
  <a href="about.html">About</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="styling.html">Styling</a>
  <a href="press.html">Press</a>
  <a href="inspiration.html">Inspiration</a>
  <a href="work.html">Work With Us</a>
</div>

<div class="page-wrap">
  <div class="press-wrap">
    <div class="press-grid" id="press-grid"></div>
  </div>
  <div id="footer-wrap"></div>
</div>

<script src="projects.js"></script>
<script src="nav.js"></script>
<script>
  const grid = document.getElementById('press-grid');
  PRESS.forEach(item => {
    const el = item.url ? document.createElement('a') : document.createElement('div');
    el.className = 'press-item' + (item.url ? '' : ' no-link');
    if (item.url) { el.href = item.url; el.target = '_blank'; el.rel = 'noopener'; }
    el.innerHTML = `
      <div class="press-pub">${item.pub}</div>
      <div class="press-title">${item.title}</div>
    `;
    grid.appendChild(el);
  });
  document.getElementById('footer-wrap').innerHTML = footerHTML();

  function toggleMobileMenu() {
    const menu = document.getElementById('nav-mobile-menu');
    if (menu) menu.classList.toggle('open');
  }
</script>
</body>
</html>
